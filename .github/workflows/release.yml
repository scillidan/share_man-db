name: Release

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v6

    - name: Set release tag
      id: run_date
      run: |
        echo "release_tag=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

    - name: Install man-db and zip md5sum tools
      run: |
        sudo apt-get update
        sudo apt-get install -y man man-db zip groff ghostscript man2html

    - name: Update man pages
      run: sudo mandb

    - name: Generate PDF files from man pages
      run: |
        chmod +x generate_pdf.sh
        ./generate_pdf.sh
        mv _pdf man-pdf

    - name: Compress man pages PDF and clean
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: |
        zip -r man-${RELEASE_TAG}-en-pdf.zip man-pdf
        rm -rf man-pdf

    - name: Copy man pages files to root dir
      run: cp -a /usr/share/man ./man

    - name: Compress GZIP files
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: zip -r man-${RELEASE_TAG}-gzip.zip man

    - name: Compress EN GZIP files
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: zip -r man-${RELEASE_TAG}-en-gzip.zip man/man[1-9]

    - name: Decompress EN GZIP files and clean
      run: |
        chmod +x decompress_gz.sh
        ./decompress_gz.sh man
        rm -rf man
        mv _decompress man

    - name: Generate docset
      run: python3 mandocset.py -o Linux_Man_Pages -i assets/tux.png -I assets/tux@2x.png -p man

    - name: Update Info.plist
      run: |
        cat > Linux_Man_Pages.docset/Contents/Info.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <plist version="1.0">
        <dict>
        <key>CFBundleIdentifier</key>
        <string>man</string>
        <key>CFBundleName</key>
        <string>Linux Man Pages</string>
        <key>DocSetPlatformFamily</key>
        <string>man</string>
        <key>isDashDocset</key>
        <true/>
        </dict>
        </plist>
        PLIST

    - name: Create docset tgz
      run: tar --exclude='.DS_Store' -czf Linux_Man_Pages.docset.tgz Linux_Man_Pages.docset

    - name: Compress EN files
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: zip -r man-${RELEASE_TAG}-en.zip man/man[1-9]

    - name: Rename EN files to "*.txt"
      run: |
        chmod +x add_suffix_txt.sh
        ./add_suffix_txt.sh man

    - name: Compress EN-txt and clean
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: |
        zip -r man-${RELEASE_TAG}-en-txt.zip man/man[1-9]
        rm -rf man

    - name: Generate checksums
      run: |
        echo "" > checksums.txt
        for file in ./man-*.zip ./Linux_Man_Pages.docset.tgz; do
          if [ -f "$file" ]; then
            sha256sum "$file" >> checksums.txt
          fi
        done

    - name: Delete existing release if tag exists
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: |
        gh release delete "$RELEASE_TAG" --yes || true
        git tag -d "$RELEASE_TAG" || true
        git push origin ":refs/tags/$RELEASE_TAG" || true

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: |
        gh release create "$RELEASE_TAG" \
          man-*.zip \
          Linux_Man_Pages.docset.tgz \
          checksums.txt \
          --title "$RELEASE_TAG"

    - name: Create or update XML file
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: |
        cat > Linux_Man_Pages.xml << EOF
        <entry>
          <name>Linux_Man_Pages</name>
          <version>${RELEASE_TAG}</version>
          <url>https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/Linux_Man_Pages.docset.tgz</url>
        </entry>
        EOF

    - name: Upload XML file
      env:
        RELEASE_TAG: ${{ steps.run_date.outputs.release_tag }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git checkout ${GITHUB_REF_NAME} || git checkout -b ${GITHUB_REF_NAME}
        git add Linux_Man_Pages.xml
        if ! git diff --cached --quiet; then
          git commit -m "Update Linux_Man_Pages.xml for release $RELEASE_TAG"
          git push origin HEAD:${GITHUB_REF_NAME}
        else
          echo "No changes to Linux_Man_Pages.xml, skipping commit."
        fi
